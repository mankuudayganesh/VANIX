<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Apply saved theme immediately to prevent Flash of Unstyled Content (FOUC)
        const savedTheme = localStorage.getItem('vanix-theme') || 'crimson';
        document.documentElement.className = 'theme-' + savedTheme;
        document.addEventListener('DOMContentLoaded', () => {
            document.body.className = 'theme-' + savedTheme;
        });
    </script>
    <link rel="icon" type="image/svg+xml" href="/vanixstudio/favicon.svg?v=4">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Lost in Space | VANIX STUDIO</title>
    <meta name="description" content="Page not found. Return to VANIX STUDIO homepage.">
    <meta name="robots" content="noindex">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0b0d1a;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* ── STAR FIELD ─────────────────────────────────── */
        .starfield {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            animation: twinkle var(--dur, 3s) ease-in-out infinite;
            animation-delay: var(--del, 0s);
        }

        @keyframes twinkle {
            0%, 100% { opacity: var(--min-op, 0.2); transform: scale(1); }
            50%       { opacity: var(--max-op, 0.9); transform: scale(1.4); }
        }

        /* ── SPACE CLOUDS ───────────────────────────────── */
        .space-cloud {
            position: absolute;
            border-radius: 40px;
            background: rgba(255,255,255,0.06);
            filter: blur(2px);
            animation: cloudDrift var(--cd, 20s) ease-in-out infinite alternate;
        }

        @keyframes cloudDrift {
            0%   { transform: translateX(0) translateY(0); }
            100% { transform: translateX(var(--cx, 30px)) translateY(var(--cy, -10px)); }
        }

        /* ── MAIN SCENE ─────────────────────────────────── */
        .scene {
            position: relative;
            z-index: 5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
        }

        /* ── 404 NUMBER ─────────────────────────────────── */
        .error-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            position: relative;
        }

        .digit {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: clamp(90px, 18vw, 200px);
            color: #ffffff;
            line-height: 1;
            text-shadow: 0 0 40px rgba(255,255,255,0.15);
            letter-spacing: -4px;
        }

        /* The "0" is replaced by the moon planet */
        .moon-zero {
            position: relative;
            width: clamp(90px, 18vw, 200px);
            height: clamp(90px, 18vw, 200px);
            margin: 0 4px;
            flex-shrink: 0;
        }

        /* Glow rings behind moon */
        .moon-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.06);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: ringPulse 3s ease-in-out infinite;
        }

        .moon-ring:nth-child(1) { width: 130%; height: 130%; animation-delay: 0s; }
        .moon-ring:nth-child(2) { width: 165%; height: 165%; animation-delay: 0.4s; }
        .moon-ring:nth-child(3) { width: 210%; height: 210%; animation-delay: 0.8s; }

        @keyframes ringPulse {
            0%, 100% { opacity: 0.08; transform: translate(-50%, -50%) scale(1); }
            50%       { opacity: 0.18; transform: translate(-50%, -50%) scale(1.04); }
        }

        /* Moon sphere */
        .moon-sphere {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #f0f0f0 0%, #c8c8d8 30%, #9090a8 60%, #606082 100%);
            box-shadow:
                inset -8px -8px 24px rgba(0,0,0,0.5),
                inset 8px 8px 20px rgba(255,255,255,0.12),
                0 0 40px rgba(200,200,220,0.25),
                0 0 80px rgba(200,200,220,0.1);
            animation: moonFloat 6s ease-in-out infinite;
        }

        @keyframes moonFloat {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-8px); }
        }

        /* Moon craters */
        .crater {
            position: absolute;
            border-radius: 50%;
            background: rgba(0,0,0,0.15);
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.3);
        }

        .crater-1 { width: 22%; height: 22%; top: 28%; left: 30%; }
        .crater-2 { width: 14%; height: 14%; top: 52%; left: 55%; }
        .crater-3 { width: 10%; height: 10%; top: 38%; left: 60%; }
        .crater-4 { width: 18%; height: 18%; top: 60%; left: 28%; }

        /* Red accent dot on moon (VANIX branding) */
        .moon-accent {
            position: absolute;
            width: 18%;
            height: 18%;
            border-radius: 50%;
            background: radial-gradient(circle, #ff3333, #aa0000);
            top: 18%;
            left: 55%;
            box-shadow: 0 0 12px rgba(var(--primary-rgb), 0.6);
            opacity: 0.8;
        }

        /* ── ASTRONAUT ──────────────────────────────────── */
        .astronaut-wrap {
            position: absolute;
            left: calc(50% - clamp(45px, 9vw, 100px) - clamp(90px, 18vw, 200px) * 0.5 - 20px);
            top: 50%;
            transform: translateY(-50%);
            animation: astroFloat 4s ease-in-out infinite;
        }

        @keyframes astroFloat {
            0%, 100% { transform: translateY(-50%) rotate(-8deg); }
            25%       { transform: translateY(calc(-50% - 18px)) rotate(5deg); }
            50%       { transform: translateY(calc(-50% - 8px)) rotate(-3deg); }
            75%       { transform: translateY(calc(-50% + 12px)) rotate(8deg); }
        }

        /* SVG astronaut container */
        .astronaut-svg {
            width: clamp(48px, 9vw, 100px);
            height: auto;
            filter: drop-shadow(0 0 12px rgba(255,255,255,0.2));
        }

        /* ── TETHER ROPE ─────────────────────────────────── */
        .tether-svg {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: visible;
        }

        .tether-path {
            fill: none;
            stroke: rgba(255,255,255,0.45);
            stroke-width: 1.5;
            stroke-dasharray: 4 4;
            animation: tetherWave 3s ease-in-out infinite;
        }

        @keyframes tetherWave {
            0%, 100% { d: path('M 0,0 C 40,30 60,-20 120,0'); }
            50%       { d: path('M 0,0 C 30,-30 80,40 120,0'); }
        }

        /* ── PLANETS ─────────────────────────────────────── */
        .planet {
            position: absolute;
            border-radius: 50%;
            animation: planetFloat var(--pf, 8s) ease-in-out infinite alternate;
        }

        @keyframes planetFloat {
            0%   { transform: translateY(0); }
            100% { transform: translateY(var(--py, -15px)); }
        }

        .planet-1 {
            width: clamp(30px, 5vw, 60px);
            height: clamp(30px, 5vw, 60px);
            background: radial-gradient(circle at 35% 35%, #8898b8, #3a4566);
            box-shadow: inset -4px -4px 12px rgba(0,0,0,0.4), 0 0 20px rgba(100,120,180,0.2);
            top: 15%;
            left: 8%;
            --pf: 9s;
            --py: -20px;
        }

        .planet-2 {
            width: clamp(22px, 3.5vw, 44px);
            height: clamp(22px, 3.5vw, 44px);
            background: radial-gradient(circle at 35% 35%, #c0a0a0, #7a5050);
            box-shadow: inset -3px -3px 8px rgba(0,0,0,0.4), 0 0 15px rgba(180,100,100,0.15);
            top: 20%;
            right: 10%;
            --pf: 11s;
            --py: -12px;
        }

        /* ── VANIX LOGO NAV ─────────────────────────────── */
        .space-nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            z-index: 100;
            padding: 20px 6%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(11, 13, 26, 0.7);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .space-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .space-logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 18px;
            color: #fff;
            box-shadow: 0 0 18px rgba(var(--primary-rgb), 0.4);
        }

        .space-logo-text {
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 3px;
        }

        .space-logo-text span { color: var(--primary); }

        /* ── TEXT CONTENT ─────────────────────────────────── */
        .lost-text {
            margin-top: 32px;
            text-align: center;
        }

        .lost-label {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(14px, 2vw, 17px);
            color: rgba(255,255,255,0.55);
            letter-spacing: 1px;
            margin-bottom: 24px;
            font-style: italic;
        }

        .lost-label em {
            color: rgba(255,255,255,0.8);
            font-style: normal;
            font-weight: 500;
        }

        .lost-buttons {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .btn-home-space {
            display: inline-block;
            padding: 13px 34px;
            background: linear-gradient(135deg, #ff2020, var(--primary-dark));
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 24px rgba(var(--primary-rgb), 0.35);
        }

        .btn-home-space:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 0 40px rgba(var(--primary-rgb), 0.6);
        }

        .btn-back-space {
            display: inline-block;
            padding: 13px 34px;
            background: transparent;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn-back-space:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.4);
            color: #fff;
            transform: translateY(-3px);
        }

        /* ── BOTTOM TAG ──────────────────────────────────── */
        .space-credit {
            margin-top: 48px;
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.12);
            text-transform: uppercase;
        }

        /* ── RESPONSIVE ──────────────────────────────────── */
        @media (max-width: 600px) {
            .astronaut-wrap { display: none; }
            .planet-1 { top: 8%; left: 5%; }
            .planet-2 { top: 8%; right: 5%; }
        }
    </style>
</head>
<body>

    <!-- STAR FIELD (generated by JS) -->
    <div class="starfield" id="starfield"></div>

    <!-- NAVIGATION -->
    <nav class="space-nav">
        <a href="index.html" class="space-logo">
            <div class="space-logo-icon">V</div>
            <div class="space-logo-text">VANIX <span>STUDIO</span></div>
        </a>
        <a href="index.html" style="color:rgba(255,255,255,0.5); text-decoration:none; font-size:12px; letter-spacing:2px; font-family:'Orbitron',monospace; transition:color 0.3s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='rgba(255,255,255,0.5)'">← HOME</a>
    </nav>

    <!-- MAIN SCENE -->
    <section class="scene">

        <!-- Planets -->
        <div class="planet planet-1"></div>
        <div class="planet planet-2"></div>

        <!-- Cloud 1 -->
        <div class="space-cloud" style="width:120px;height:18px;top:32%;left:5%;--cd:15s;--cx:25px;--cy:-8px;"></div>
        <div class="space-cloud" style="width:80px;height:12px;top:34%;left:6%;--cd:15s;--cx:25px;--cy:-8px;margin-top:22px;"></div>

        <!-- Cloud 2 -->
        <div class="space-cloud" style="width:100px;height:14px;top:68%;right:7%;--cd:18s;--cx:-20px;--cy:10px;"></div>
        <div class="space-cloud" style="width:70px;height:10px;top:69%;right:8%;margin-top:18px;--cd:18s;--cx:-20px;--cy:10px;"></div>

        <!-- 404 ROW -->
        <div class="error-row" id="errorRow">

            <!-- Astronaut + Tether (positioned relative to error-row) -->
            <div class="astronaut-wrap" id="astronautWrap">
                <!-- Tether rope SVG -->
                <svg class="tether-svg" viewBox="0 0 130 20" style="position:absolute;left:100%;top:50%;transform:translateY(-50%);width:clamp(50px,8vw,130px);height:40px;">
                    <path class="tether-path" d="M 0,10 C 30,0 70,20 130,10"/>
                </svg>

                <!-- Astronaut SVG -->
                <svg class="astronaut-svg" viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg">
                    <!-- Body suit -->
                    <ellipse cx="40" cy="60" rx="22" ry="26" fill="#e8ecf4" stroke="#c8ccd8" stroke-width="1.5"/>
                    <!-- Helmet -->
                    <circle cx="40" cy="28" r="18" fill="#e8ecf4" stroke="#c8ccd8" stroke-width="1.5"/>
                    <!-- Visor -->
                    <ellipse cx="40" cy="27" rx="11" ry="9" fill="#3a4a7a" opacity="0.85"/>
                    <!-- Visor shine -->
                    <ellipse cx="36" cy="24" rx="4" ry="3" fill="rgba(255,255,255,0.25)"/>
                    <!-- Helmet red accent stripe (VANIX) -->
                    <path d="M 24,22 Q 40,14 56,22" stroke="#ff2020" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    <!-- Left arm -->
                    <ellipse cx="18" cy="60" rx="8" ry="14" fill="#d8dce8" stroke="#b8bcd0" stroke-width="1" transform="rotate(-20 18 60)"/>
                    <!-- Right arm (waving / reaching) -->
                    <ellipse cx="62" cy="54" rx="8" ry="14" fill="#d8dce8" stroke="#b8bcd0" stroke-width="1" transform="rotate(25 62 54)"/>
                    <!-- Tether attach point on right arm -->
                    <circle cx="69" cy="47" r="3" fill="#ff2020" opacity="0.9"/>
                    <!-- Left leg -->
                    <ellipse cx="30" cy="83" rx="8" ry="12" fill="#d0d4e4" stroke="#b0b4c8" stroke-width="1" transform="rotate(10 30 83)"/>
                    <!-- Right leg -->
                    <ellipse cx="50" cy="83" rx="8" ry="12" fill="#d0d4e4" stroke="#b0b4c8" stroke-width="1" transform="rotate(-10 50 83)"/>
                    <!-- Backpack -->
                    <rect x="30" y="50" width="20" height="18" rx="4" fill="#c0c4d4" stroke="#a0a4b8" stroke-width="1"/>
                    <!-- Backpack detail -->
                    <rect x="34" y="54" width="12" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
                    <rect x="34" y="60" width="12" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
                </svg>
            </div>

            <!-- Digit 4 (left) -->
            <div class="digit">4</div>

            <!-- Moon Zero -->
            <div class="moon-zero">
                <div class="moon-ring"></div>
                <div class="moon-ring"></div>
                <div class="moon-ring"></div>
                <div class="moon-sphere">
                    <div class="crater crater-1"></div>
                    <div class="crater crater-2"></div>
                    <div class="crater crater-3"></div>
                    <div class="crater crater-4"></div>
                    <div class="moon-accent"></div>
                </div>
            </div>

            <!-- Digit 4 (right) -->
            <div class="digit">4</div>

        </div>

        <!-- Text -->
        <div class="lost-text">
            <p class="lost-label">it looks like you're <em>lost in space...</em></p>
            <div class="lost-buttons">
                <a href="index.html" class="btn-home-space">← RETURN HOME</a>
                <a href="portfolio.html" class="btn-back-space">VIEW PORTFOLIO</a>
            </div>
        </div>

        <div class="space-credit">VANIX STUDIO · 2026</div>
    </section>

    <script>
    // ── Generate star field ──────────────────────────────────────
    (function() {
        const field = document.getElementById('starfield');
        const count = 180;
        for (let i = 0; i < count; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 2.5 + 0.5;
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const dur = (Math.random() * 4 + 2).toFixed(1) + 's';
            const del = (Math.random() * 5).toFixed(1) + 's';
            const minOp = (Math.random() * 0.1 + 0.05).toFixed(2);
            const maxOp = (Math.random() * 0.6 + 0.3).toFixed(2);
            s.style.cssText = `
                width:${size}px; height:${size}px;
                left:${x}%; top:${y}%;
                --dur:${dur}; --del:${del};
                --min-op:${minOp}; --max-op:${maxOp};
            `;
            field.appendChild(s);
        }
    })();

    // ── Shooting stars ───────────────────────────────────────────
    (function() {
        function shootingStar() {
            const star = document.createElement('div');
            const startX = Math.random() * 60 + 10;
            const startY = Math.random() * 40;
            const len = Math.random() * 100 + 60;
            star.style.cssText = `
                position:fixed;
                left:${startX}%;
                top:${startY}%;
                width:${len}px;
                height:1.5px;
                background:linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.85), rgba(255,255,255,0));
                border-radius:1px;
                z-index:1;
                transform:rotate(-25deg);
                opacity:0;
                pointer-events:none;
                transition:none;
            `;
            document.body.appendChild(star);

            let start = null;
            const dur = 700;
            function animate(ts) {
                if (!start) start = ts;
                const p = Math.min((ts - start) / dur, 1);
                const ease = p < 0.3 ? p / 0.3 : 1 - ((p - 0.3) / 0.7);
                star.style.opacity = ease * 0.85;
                star.style.transform = `rotate(-25deg) translateX(${p * 120}px)`;
                if (p < 1) requestAnimationFrame(animate);
                else star.remove();
            }
            requestAnimationFrame(animate);

            // Schedule next
            setTimeout(shootingStar, Math.random() * 6000 + 3000);
        }
        setTimeout(shootingStar, 2000);
    })();

    // ── Astronaut mouse parallax ─────────────────────────────────
    (function() {
        const wrap = document.getElementById('astronautWrap');
        if (!wrap) return;
        let mx = 0, my = 0, cx = 0, cy = 0;
        window.addEventListener('mousemove', (e) => {
            mx = (e.clientX / window.innerWidth - 0.5) * 18;
            my = (e.clientY / window.innerHeight - 0.5) * 10;
        });
        function lerp(a, b, t) { return a + (b - a) * t; }
        function loop() {
            cx = lerp(cx, mx, 0.05);
            cy = lerp(cy, my, 0.05);
            wrap.style.marginLeft = cx + 'px';
            requestAnimationFrame(loop);
        }
        loop();
    })();
    </script>
</body>
</html>
